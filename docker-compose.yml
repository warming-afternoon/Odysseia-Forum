services:
  odysseia-forum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odysseia-forum
    restart: unless-stopped
    working_dir: /app
    ports:
      - "10810:10810"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data
    # 确保 Redis 健康后再启动机器人
    depends_on:
      odysseia-redis:
        condition: service_healthy
    # 默认不执行迁移；需要迁移时通过命令行传入：
    #   RUN_MIGRATE=1 docker compose up -d --build
    environment:
      PYTHONPATH: /app/src
      REDIS_URL: redis://odysseia-redis:6379/0
      RUN_MIGRATE: ${RUN_MIGRATE:-0}
    command: ["/app/entrypoint.sh"]

  odysseia-redis:
    image: redis:alpine
    container_name: odysseia-redis
    restart: unless-stopped
    ports:
      - "11810:6379"
    volumes:
      - ./data/redis:/data
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["redis-server", "--appendonly", "yes"]