<body style="background:#18191c;margin:0">
  <div id="app"></div>
  <script>
    // Extract #token=xxx from hash BEFORE Vue Router initializes,
    // since hash-based routing would swallow it as a route path.
    (function() {
      var h = window.location.hash;
      var m = h.match(/[#&]token=([A-Za-z0-9._-]+)/);
      if (m) {
        localStorage.setItem('auth_token', m[1]);
        history.replaceState(null, '', window.location.pathname + window.location.search + '#/');
      }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
